name: Monolith CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Type Check
  # -------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run type-check

  # -------------------------------------------------------------------------
  # Job 2: Lint
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  # -------------------------------------------------------------------------
  # Job 3: Build Next.js App
  # -------------------------------------------------------------------------
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_VAULT_CONTRACT_ID: ${{ secrets.VAULT_CONTRACT_ID }}
          NEXT_PUBLIC_TOKEN_CONTRACT_ID: ${{ secrets.TOKEN_CONTRACT_ID }}
          NEXT_PUBLIC_VAULT_ADMIN_ADDRESS: ${{ secrets.VAULT_ADMIN_ADDRESS }}
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # -------------------------------------------------------------------------
  # Job 4: Build Soroban Contract
  # -------------------------------------------------------------------------
  build-contract:
    name: Build Soroban Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/monolith-vault/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/monolith-vault/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v25.1.0
      - name: Build contract
        run: stellar contract build
        working-directory: contracts/monolith-vault
      - uses: actions/upload-artifact@v4
        with:
          name: vault-wasm
          path: contracts/monolith-vault/target/wasm32v1-none/release/monolith_vault.wasm
          retention-days: 7

  # -------------------------------------------------------------------------
  # Job 5: Deploy to Vercel
  # Uses the official vercel/action which creates a GitHub Deployment entry
  # so it appears in the "Deployments" section on the repo homepage.
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, build-contract]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      deployments: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: BetaHuhn/deploy-to-vercel-action@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PRODUCTION: true
