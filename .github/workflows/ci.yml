name: Monolith CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Type Check
  # -------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript type check
        run: npm run type-check

  # -------------------------------------------------------------------------
  # Job 2: Lint
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  # -------------------------------------------------------------------------
  # Job 3: Build Next.js App
  # -------------------------------------------------------------------------
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest
    needs: [typecheck, lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_VAULT_CONTRACT_ID: CBN4ZR3FTJFIOISCWVF27GXUDAFLNSMVP6BTOWPBEBKES2VOIHS2HS6J
          NEXT_PUBLIC_TOKEN_CONTRACT_ID: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
          NEXT_PUBLIC_VAULT_ADMIN_ADDRESS: GC5HL2KXTCEXGZU4N6QIDQLIXW6HSFYEZV7ELAEEHDL4EHUMVSTZCPX6

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # -------------------------------------------------------------------------
  # Job 4: Build Soroban Contract
  # -------------------------------------------------------------------------
  build-contract:
    name: Build Soroban Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/monolith-vault/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/monolith-vault/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Stellar CLI (pre-built binary)
        run: |
          curl -sSL https://github.com/stellar/stellar-cli/releases/download/v25.1.0/stellar-cli-25.1.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin stellar
          stellar --version

      - name: Build vault contract
        run: stellar contract build
        working-directory: contracts/monolith-vault

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-wasm
          path: contracts/monolith-vault/target/wasm32v1-none/release/monolith_vault.wasm
          retention-days: 7
