name: Monolith CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Type Check
  # -------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run type-check

  # -------------------------------------------------------------------------
  # Job 2: Lint
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  # -------------------------------------------------------------------------
  # Job 3: Build Next.js App
  # -------------------------------------------------------------------------
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_VAULT_CONTRACT_ID: ${{ secrets.VAULT_CONTRACT_ID }}
          NEXT_PUBLIC_TOKEN_CONTRACT_ID: ${{ secrets.TOKEN_CONTRACT_ID }}
          NEXT_PUBLIC_VAULT_ADMIN_ADDRESS: ${{ secrets.VAULT_ADMIN_ADDRESS }}
      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # -------------------------------------------------------------------------
  # Job 4: Build Soroban Contract
  # -------------------------------------------------------------------------
  build-contract:
    name: Build Soroban Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/monolith-vault/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/monolith-vault/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install Stellar CLI
        run: |
          curl -sSL https://github.com/stellar/stellar-cli/releases/download/v25.1.0/stellar-cli-25.1.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin stellar
          stellar --version
      - name: Build contract
        run: stellar contract build
        working-directory: contracts/monolith-vault
      - uses: actions/upload-artifact@v4
        with:
          name: vault-wasm
          path: contracts/monolith-vault/target/wasm32v1-none/release/monolith_vault.wasm
          retention-days: 7

  # -------------------------------------------------------------------------
  # Job 5: Deploy to Vercel (main branch only)
  # Uses amondnet/vercel-action — no vercel pull needed, works with token only
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, build-contract]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
